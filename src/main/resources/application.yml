spring:
  application:
    name: crispix-ai
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://your-host:3306/your-database
    username: your-username
    password: your-password

# AgentScope Configuration
agentscope:
  agent-name: ${AGENTSCOPE_AGENT_NAME:crispix-assistant}
  model: ${AGENTSCOPE_MODEL:openai:gpt-4o}
  workspace-path: ${AGENTSCOPE_WORKSPACE:./.agentscope/workspace}

  # OpenAI and compatible providers (DeepSeek, Kimi, etc.)
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

  # Anthropic Claude
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}

  # AgentScope Studio - 可视化调试平台
  studio:
    enabled: ${AGENTSCOPE_STUDIO_ENABLED:false}
    url: ${AGENTSCOPE_STUDIO_URL:http://localhost:3000}
    project: ${AGENTSCOPE_STUDIO_PROJECT:crispix-ai}
    run-name: ${AGENTSCOPE_STUDIO_RUN:crispix-run}

