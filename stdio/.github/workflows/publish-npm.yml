name: Publish to NPM

on:
    release:
        types: [published]

permissions:
    contents: read

concurrency:
    group: publish-npm-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  registry-url: 'https://registry.npmjs.org'

            - name: Get version from package.json
              id: package_version
              run: |
                  PACKAGE_VERSION=$(node -p "require('./package.json').version")
                  echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
                  echo "📦 Package.json version: $PACKAGE_VERSION"
            - name: Check if version exists on npm
              id: npm_check
              run: |
                  PKG_NAME=$(node -p "require('./package.json').name")
                  VERSION="${{ steps.package_version.outputs.version }}"
                  if npm view "$PKG_NAME@$VERSION" version >/dev/null 2>&1; then
                    echo ""
                    echo "╔════════════════════════════════════════════════════════════╗"
                    echo "║  ⚠️  VERSION ALREADY EXISTS - SKIPPING PUBLISH              ║"
                    echo "╠════════════════════════════════════════════════════════════╣"
                    echo "║  Package: $PKG_NAME"
                    echo "║  Version: $VERSION"
                    echo "║  Status:  Already published on npm"
                    echo "╚════════════════════════════════════════════════════════════╝"
                    echo ""
                    echo "::warning::⚠️ $PKG_NAME@$VERSION already exists on npm, skipping publish"
                    echo "already_exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "✅ $PKG_NAME@$VERSION not found on npm, will publish"
                    echo "already_exists=false" >> $GITHUB_OUTPUT
                  fi
            - name: Install dependencies
              if: steps.npm_check.outputs.already_exists == 'false'
              run: npm ci

            - name: Build
              if: steps.npm_check.outputs.already_exists == 'false'
              run: npm run build

            - name: Publish to NPM
              if: steps.npm_check.outputs.already_exists == 'false'
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: npm publish --access public

            - name: Success
              if: steps.npm_check.outputs.already_exists == 'false'
              run: |
                  PKG_NAME=$(node -p "require('./package.json').name")
                  VERSION="${{ steps.package_version.outputs.version }}"
                  echo ""
                  echo "╔════════════════════════════════════════════════════════════╗"
                  echo "║  🎉  PUBLISH SUCCESS                                        ║"
                  echo "╠════════════════════════════════════════════════════════════╣"
                  echo "║  Package: $PKG_NAME"
                  echo "║  Version: $VERSION"
                  echo "║  URL:     https://www.npmjs.com/package/$PKG_NAME"
                  echo "╚════════════════════════════════════════════════════════════╝"
                  echo ""
            - name: Skipped
              if: steps.npm_check.outputs.already_exists == 'true'
              run: |
                  PKG_NAME=$(node -p "require('./package.json').name")
                  VERSION="${{ steps.package_version.outputs.version }}"
                  echo ""
                  echo "╔════════════════════════════════════════════════════════════╗"
                  echo "║  ⏭️  PUBLISH SKIPPED                                        ║"
                  echo "╠════════════════════════════════════════════════════════════╣"
                  echo "║  Package: $PKG_NAME"
                  echo "║  Version: $VERSION"
                  echo "║  Reason:  Version already exists on npm"
                  echo "╚════════════════════════════════════════════════════════════╝"
                  echo ""
